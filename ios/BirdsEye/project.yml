# Fallback: regenerate the Xcode project with `xcodegen` (brew install xcodegen)
# if project.pbxproj ever gets mangled. Normally you never need this — just open
# BirdsEye.xcodeproj directly.
name: BirdsEye
options:
  bundleIdPrefix: com.birdseye
  deploymentTarget:
    iOS: "17.0"
targets:
  BirdsEye:
    type: application
    platform: iOS
    sources: [BirdsEye]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Birds Eye uses your location and heading to show which landmarks are around you."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.birdseye.prototype
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
